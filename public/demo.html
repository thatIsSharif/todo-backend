<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo: 2 + 2</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 3rem 4rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }
    h1 { font-size: 2.5rem; margin: 0; color: #222; }
    .result { font-size: 4rem; font-weight: 700; color: #2563eb; margin: 1rem 0; }
  </style>
</head>
<body>
  <div class="card">
    <h1>2 + 2</h1>
    <div class="result">= 4</div>
  </div>
</body>
</html>
